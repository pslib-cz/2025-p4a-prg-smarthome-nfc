<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">SmartLend ESP32-C3 UART loopback test</title>
  <desc id="desc">Testovaci schema: odpojit NFC TXD/RXD a docasne propojit ESP pin 5 s ESP pinem 6.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .safe { fill: #ecfdf5; stroke: #22c55e; stroke-width: 2; }
      .warn { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; }
      .danger { fill: #fff1f2; stroke: #fb7185; stroke-width: 2; }
      .mutedBox { fill: #eef2f7; stroke: #cbd5e1; stroke-width: 2; }
      .txt { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
      .title { font-size: 34px; font-weight: 800; }
      .h2 { font-size: 24px; font-weight: 800; }
      .h3 { font-size: 18px; font-weight: 800; }
      .body { font-size: 16px; }
      .small { font-size: 13px; }
      .tiny { font-size: 11px; }
      .white { fill: #ffffff; }
      .muted { fill: #4b5563; }
      .pin { fill: #ffffff; stroke: #111827; stroke-width: 1.5; }
      .pad { fill: #d1d5db; stroke: #6b7280; stroke-width: 1; }
      .hole { fill: #111827; opacity: 0.28; }
      .loopWire { stroke: #7c3aed; stroke-width: 8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .blueWire { stroke: #2563eb; stroke-width: 6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .yellowWire { stroke: #eab308; stroke-width: 6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .blackWire { stroke: #111827; stroke-width: 6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .redWire { stroke: #dc2626; stroke-width: 6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .disconnected { stroke: #ef4444; stroke-width: 4; stroke-dasharray: 10 9; fill: none; stroke-linecap: round; }
      .cross { stroke: #ef4444; stroke-width: 5; stroke-linecap: round; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect class="bg" width="1400" height="900"/>

  <text class="txt title" x="40" y="55">SmartLend - loopback test ESP pinu 5 a 6</text>
  <text class="txt body muted" x="40" y="86">Toto neni finalni zapojeni NFC. Je to jen diagnostika, jestli ESP a kabely na pinech 5/6 funguji.</text>

  <rect class="danger" x="40" y="112" width="1320" height="64" rx="12"/>
  <text class="txt h3" x="62" y="139">NEJDRIV ODPOJ USB</text>
  <text class="txt body" x="62" y="162">Na tenhle test odpoj z cervene NFC desky datove draty TXD a RXD. Nepropojuj nic s 5V. Propojujeme jen ESP pin 5 a ESP pin 6.</text>

  <rect class="panel" x="40" y="205" width="1320" height="510" rx="18"/>
  <text class="txt h2" x="70" y="245">Co mas docasne zapojit</text>
  <text class="txt body muted" x="70" y="274">Konce dratu, ktere normalne vedou do ESP pinu 5 a 6, dej spolu do jedne radky breadboardu nebo je spoj jednim jumperem.</text>

  <!-- Breadboard -->
  <rect x="85" y="330" width="700" height="290" rx="16" fill="#f2f3f5" stroke="#9ca3af" stroke-width="2"/>
  <line x1="112" y1="354" x2="758" y2="354" stroke="#ef4444" stroke-width="3"/>
  <line x1="112" y1="596" x2="758" y2="596" stroke="#3b82f6" stroke-width="3"/>
  <rect x="390" y="330" width="55" height="290" fill="#e5e7eb"/>
  <text class="txt small muted" x="105" y="319">breadboard</text>
  <text class="txt small muted" x="400" y="319">stredova mezera</text>

  <!-- holes -->
  <g>
    <circle class="hole" cx="130" cy="385" r="4"/><circle class="hole" cx="158" cy="385" r="4"/><circle class="hole" cx="186" cy="385" r="4"/><circle class="hole" cx="214" cy="385" r="4"/><circle class="hole" cx="242" cy="385" r="4"/>
    <circle class="hole" cx="130" cy="420" r="4"/><circle class="hole" cx="158" cy="420" r="4"/><circle class="hole" cx="186" cy="420" r="4"/><circle class="hole" cx="214" cy="420" r="4"/><circle class="hole" cx="242" cy="420" r="4"/>
    <circle class="hole" cx="130" cy="455" r="4"/><circle class="hole" cx="158" cy="455" r="4"/><circle class="hole" cx="186" cy="455" r="4"/><circle class="hole" cx="214" cy="455" r="4"/><circle class="hole" cx="242" cy="455" r="4"/>
    <circle class="hole" cx="130" cy="490" r="4"/><circle class="hole" cx="158" cy="490" r="4"/><circle class="hole" cx="186" cy="490" r="4"/><circle class="hole" cx="214" cy="490" r="4"/><circle class="hole" cx="242" cy="490" r="4"/>
    <circle class="hole" cx="130" cy="525" r="4"/><circle class="hole" cx="158" cy="525" r="4"/><circle class="hole" cx="186" cy="525" r="4"/><circle class="hole" cx="214" cy="525" r="4"/><circle class="hole" cx="242" cy="525" r="4"/>

    <circle class="hole" cx="495" cy="385" r="4"/><circle class="hole" cx="523" cy="385" r="4"/><circle class="hole" cx="551" cy="385" r="4"/><circle class="hole" cx="579" cy="385" r="4"/><circle class="hole" cx="607" cy="385" r="4"/>
    <circle class="hole" cx="495" cy="420" r="4"/><circle class="hole" cx="523" cy="420" r="4"/><circle class="hole" cx="551" cy="420" r="4"/><circle class="hole" cx="579" cy="420" r="4"/><circle class="hole" cx="607" cy="420" r="4"/>
    <circle class="hole" cx="495" cy="455" r="4"/><circle class="hole" cx="523" cy="455" r="4"/><circle class="hole" cx="551" cy="455" r="4"/><circle class="hole" cx="579" cy="455" r="4"/><circle class="hole" cx="607" cy="455" r="4"/>
    <circle class="hole" cx="495" cy="490" r="4"/><circle class="hole" cx="523" cy="490" r="4"/><circle class="hole" cx="551" cy="490" r="4"/><circle class="hole" cx="579" cy="490" r="4"/><circle class="hole" cx="607" cy="490" r="4"/>
    <circle class="hole" cx="495" cy="525" r="4"/><circle class="hole" cx="523" cy="525" r="4"/><circle class="hole" cx="551" cy="525" r="4"/><circle class="hole" cx="579" cy="525" r="4"/><circle class="hole" cx="607" cy="525" r="4"/>
  </g>

  <!-- ESP board mimics user's ESP32-C3 SuperMini -->
  <rect x="255" y="355" width="285" height="235" rx="14" fill="#111827" stroke="#030712" stroke-width="3"/>
  <rect x="350" y="332" width="92" height="38" rx="7" fill="#cfd5de" stroke="#6b7280" stroke-width="2"/>
  <rect x="342" y="392" width="44" height="24" rx="10" fill="#6b7280" stroke="#374151" stroke-width="2"/>
  <rect x="405" y="392" width="44" height="24" rx="10" fill="#6b7280" stroke="#374151" stroke-width="2"/>
  <polygon points="397,452 438,493 397,534 356,493" fill="#030712" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="357" y="570" width="78" height="12" rx="2" fill="#b91c1c"/>
  <text class="txt h3 white" x="340" y="445">ESP32-C3</text>
  <text class="txt body white" x="326" y="470">cerna deska</text>
  <text class="txt small" x="344" y="552" fill="#9ca3af">cervena antena dole</text>

  <!-- ESP pads/labels -->
  <g>
    <rect class="pad" x="239" y="386" width="16" height="13" rx="3"/><text class="txt small" x="208" y="397">10</text>
    <rect class="pad" x="239" y="414" width="16" height="13" rx="3"/><text class="txt small" x="214" y="425">9</text>
    <rect class="pad" x="239" y="442" width="16" height="13" rx="3"/><text class="txt small" x="214" y="453">8</text>
    <rect class="pad" x="239" y="470" width="16" height="13" rx="3"/><text class="txt small" x="214" y="481">4</text>
    <rect class="pad" x="239" y="498" width="16" height="13" rx="3"/><text class="txt small" x="214" y="509">3</text>
    <rect class="pad" x="239" y="526" width="16" height="13" rx="3"/><text class="txt small" x="214" y="537">2</text>
    <rect class="pad" x="239" y="554" width="16" height="13" rx="3"/><text class="txt small" x="214" y="565">1</text>

    <rect class="pad" x="540" y="386" width="16" height="13" rx="3"/><text class="txt small" x="564" y="397">5V</text>
    <rect class="pad" x="540" y="414" width="16" height="13" rx="3"/><text class="txt small" x="564" y="425">G</text>
    <rect class="pad" x="540" y="442" width="16" height="13" rx="3"/><text class="txt small" x="564" y="453">3.3</text>
    <rect class="pad" x="540" y="470" width="16" height="13" rx="3"/><text class="txt small" x="564" y="481">5</text>
    <rect class="pad" x="540" y="498" width="16" height="13" rx="3"/><text class="txt small" x="564" y="509">6</text>
    <rect class="pad" x="540" y="526" width="16" height="13" rx="3"/><text class="txt small" x="564" y="537">7</text>
    <rect class="pad" x="540" y="554" width="16" height="13" rx="3"/><text class="txt small" x="564" y="565">20</text>
  </g>

  <!-- Highlight ESP 5 and 6 -->
  <rect x="532" y="462" width="72" height="58" rx="10" fill="none" stroke="#7c3aed" stroke-width="4"/>
  <text class="txt h3" x="620" y="486" fill="#6d28d9">jen tyhle dva piny</text>
  <text class="txt body" x="620" y="512" fill="#6d28d9">ESP pin 5 a ESP pin 6</text>

  <!-- Loopback wire from pin 5 to pin 6, shown as same breadboard row/jumper -->
  <path class="loopWire" d="M556 476 H690 V506 H556" marker-end="url(#arrow)"/>
  <circle cx="556" cy="476" r="7" fill="#7c3aed"/>
  <circle cx="556" cy="504" r="7" fill="#7c3aed"/>
  <rect class="safe" x="610" y="548" width="395" height="52" rx="10"/>
  <text class="txt body" x="632" y="579">Spravne pro test: ESP 5 je docasne spojeny s ESP 6.</text>

  <!-- NFC board disconnected -->
  <rect x="1005" y="350" width="285" height="215" rx="18" fill="#b91c1c" stroke="#7f1d1d" stroke-width="4" opacity="0.92"/>
  <circle cx="1029" cy="526" r="15" fill="#fee2e2" stroke="#7f1d1d" stroke-width="3"/>
  <circle cx="1265" cy="374" r="15" fill="#fee2e2" stroke="#7f1d1d" stroke-width="3"/>
  <rect x="1120" y="421" width="55" height="45" rx="4" fill="#7f1d1d" opacity="0.7"/>
  <text class="txt h3 white" x="1060" y="401">CERVENA NFC</text>
  <text class="txt small white" x="1043" y="536">pro tenhle test ji datove odpoj</text>
  <rect class="pin" x="910" y="382" width="72" height="28" rx="6"/><text class="txt small" x="930" y="401">GND</text>
  <rect class="pin" x="910" y="422" width="72" height="28" rx="6"/><text class="txt small" x="932" y="441">VCC</text>
  <rect class="pin" x="910" y="462" width="72" height="28" rx="6"/><text class="txt small" x="931" y="481">TXD</text>
  <rect class="pin" x="910" y="502" width="72" height="28" rx="6"/><text class="txt small" x="931" y="521">RXD</text>

  <!-- disconnected data wires with red crosses -->
  <path class="disconnected" d="M982 476 H880"/>
  <path class="disconnected" d="M982 516 H880"/>
  <line class="cross" x1="858" y1="458" x2="890" y2="490"/>
  <line class="cross" x1="890" y1="458" x2="858" y2="490"/>
  <line class="cross" x1="858" y1="498" x2="890" y2="530"/>
  <line class="cross" x1="890" y1="498" x2="858" y2="530"/>
  <text class="txt h3" x="875" y="610" fill="#b91c1c">TXD/RXD ted NEJSOU v NFC</text>
  <text class="txt body muted" x="875" y="635">Datove draty z NFC jsou venku. Testujeme jen ESP 5 &lt;-&gt; 6.</text>

  <!-- bottom instructions -->
  <rect class="panel" x="40" y="750" width="1320" height="110" rx="16"/>
  <text class="txt h2" x="70" y="787">Co pak cekame v logu</text>
  <text class="txt body" x="70" y="817">Kdyz ESP piny a kabely funguji, uvidime odeslana data i prijata data:</text>
  <rect x="545" y="778" width="340" height="58" rx="10" fill="#111827"/>
  <text class="txt body white" x="568" y="801">&gt;&gt;&gt; 55:55:00...</text>
  <text class="txt body white" x="568" y="825">&lt;&lt;&lt; 55:55:00...</text>
  <text class="txt body" x="930" y="817">Kdyz se neukaze &lt;&lt;&lt;, je problem v ESP pinech, kabelu nebo kontaktu.</text>
</svg>
