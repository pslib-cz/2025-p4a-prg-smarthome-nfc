input_select:
  item_usb_c_cable:
    name: "USB-C cable"
    icon: mdi:usb-port
    options:
      - available
      - borrowed
    initial: available

  item_adapter:
    name: "Adapter"
    icon: mdi:power-plug
    options:
      - available
      - borrowed
    initial: available

  item_meter:
    name: "Meter"
    icon: mdi:multimeter
    options:
      - available
      - borrowed
    initial: available

  item_tripod:
    name: "Tripod"
    icon: mdi:camera-outline
    options:
      - available
      - borrowed
    initial: available

  item_microphone:
    name: "Microphone"
    icon: mdi:microphone
    options:
      - available
      - borrowed
    initial: available

  item_ring_light:
    name: "Ring light"
    icon: mdi:lightbulb-on-outline
    options:
      - available
      - borrowed
    initial: available

  item_hdmi_cable:
    name: "HDMI cable"
    icon: mdi:hdmi-port
    options:
      - available
      - borrowed
    initial: available

  item_headphones:
    name: "Headphones"
    icon: mdi:headphones
    options:
      - available
      - borrowed
    initial: available

  item_sd_reader:
    name: "SD card reader"
    icon: mdi:sd
    options:
      - available
      - borrowed
    initial: available

  system_mode:
    name: "SmartLend system mode"
    icon: mdi:cog
    options:
      - normal
      - maintenance
      - presentation
    initial: normal

  borrower:
    name: "Current borrower"
    icon: mdi:account-circle
    options:
      - "Unassigned"
      - "David"
      - "Petr"
      - "Jana"
      - "Adam"
      - "Host (Guest)"
    initial: "Unassigned"

