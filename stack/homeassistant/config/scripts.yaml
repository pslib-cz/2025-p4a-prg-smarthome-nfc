smartlend_toggle_item:
  alias: "SmartLend - Toggle item borrow/return"
  description: "Flips the given input_select between available <-> borrowed with per-item holder guard"
  mode: parallel
  max: 10
  fields:
    item_entity:
      description: "entity_id of the input_select to toggle"
      example: "input_select.item_usb_c_cable"
    item_label:
      description: "Human-readable name for the item"
      example: "USB-C cable"
    holder_entity:
      description: "input_text entity that tracks who currently holds this item"
      example: "input_text.holder_usb_c_cable"
    nfc_entity:
      description: "input_text entity that remembers the NFC UID used to borrow this item"
      example: "input_text.last_nfc_usb_c_cable"
    nfc_uid:
      description: "NFC tag UID captured at the moment the user acted (empty if no tap in the flow)"
      example: "6E-27-17-07"
  sequence:
    - variables:
        current: "{{ states(item_entity) }}"
        borrower_sel: "{{ states('input_select.borrower') }}"
        active_txt: "{{ states('input_text.active_user') | default('') }}"
        hint: "{{ user_hint | default('') }}"
        user: >-
          {% if hint and hint not in ['Unassigned', 'unknown', ''] %}{{ hint }}{% elif borrower_sel not in ['Unassigned', 'unknown', 'unavailable', ''] %}{{ borrower_sel }}{% elif active_txt not in ['', 'unknown', 'none'] %}{{ active_txt }}{% endif %}
        current_holder: "{{ states(holder_entity) | default('') }}"
        # Resolve nfc fields into locals — the downstream `choose` below checks
        # these, and using the raw script field names there hit a Jinja scoping
        # corner case where `nfc_entity is defined` returned False even when
        # the caller provided the field. Hoisting is a reliable workaround.
        nfc_entity_safe: "{{ nfc_entity | default('') }}"
        nfc_uid_safe: "{{ nfc_uid | default('') }}"
        # Denial = item is borrowed, and a *different* identified user tries to return it
        is_denied: >-
          {{ current == 'borrowed'
             and user and user != ''
             and current_holder and current_holder != ''
             and user != current_holder }}
    # ───── DENIED branch: wrong person trying to return someone else's item ─────
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ is_denied }}"
          sequence:
            - service: input_text.set_value
              target:
                entity_id: input_text.last_action
              data:
                value: "🚫 DENIED: {{ item_label }} already borrowed by {{ current_holder }} — {{ user }} cannot return it (at {{ now().strftime('%H:%M') }})"
            - service: logbook.log
              data:
                name: SmartLend
                message: "DENIED: {{ user }} tried to return {{ item_label }} held by {{ current_holder }}"
                entity_id: "{{ item_entity }}"
            - service: light.turn_on
              target:
                entity_id: light.smartlend_nfc_status_ring
              data:
                rgb_color: [255, 0, 0]
                brightness_pct: 50
            - delay: "00:00:01"
            - service: light.turn_off
              target:
                entity_id: light.smartlend_nfc_status_ring
        # ───── NORMAL branch: legal borrow or return ─────
        - conditions:
            - condition: template
              value_template: "{{ not is_denied }}"
          sequence:
            - variables:
                next_state: "{{ 'borrowed' if current == 'available' else 'available' }}"
                verb: "{{ 'borrowed' if current == 'available' else 'returned' }}"
                by: "{{ (' by ' ~ user) if user else '' }}"
                message: "{{ item_label }} {{ verb }}{{ by }} at {{ now().strftime('%H:%M') }}"
                new_holder: "{{ user if next_state == 'borrowed' else '' }}"
            - service: input_select.select_option
              target:
                entity_id: "{{ item_entity }}"
              data:
                option: "{{ next_state }}"
            # Update holder: on borrow set the user, on return clear it.
            - service: input_text.set_value
              target:
                entity_id: "{{ holder_entity }}"
              data:
                value: "{{ new_holder }}"
            # Remember / clear the NFC UID bound to this borrow so the UI
            # can tell "same card re-tapped" from "unrelated card tapped".
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ nfc_entity_safe != '' }}"
                  sequence:
                    - service: input_text.set_value
                      target:
                        entity_id: "{{ nfc_entity_safe }}"
                      data:
                        value: "{{ nfc_uid_safe if next_state == 'borrowed' else '' }}"
            - service: input_text.set_value
              target:
                entity_id: input_text.last_action
              data:
                value: "{{ message }}"
            - service: logbook.log
              data:
                name: SmartLend
                message: "{{ message }}"
                entity_id: "{{ item_entity }}"
            - continue_on_error: true
              service: mqtt.publish
              data:
                topic: "smartlend/events/{{ item_entity.split('.')[1] }}"
                payload: >
                  {
                    "item": "{{ item_label }}",
                    "state": "{{ next_state }}",
                    "action": "{{ verb }}",
                    "user": "{{ user }}",
                    "holder": "{{ new_holder }}",
                    "ts": "{{ now().isoformat() }}"
                  }
                qos: 0
                retain: false
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ next_state == 'borrowed' }}"
                  sequence:
                    - service: counter.increment
                      target:
                        entity_id: counter.borrow_count_today

smartlend_toggle_usb_c_cable:
  alias: "SmartLend - Toggle USB-C cable"
  icon: mdi:usb-port
  mode: single
  fields:
    user_hint:
      description: "Optional: explicit borrower name to override input_select.borrower"
      example: "Petr"
    nfc_uid:
      description: "Optional: NFC UID from the tap that triggered this action"
      example: "6E-27-17-07"
  sequence:
    - service: script.smartlend_toggle_item
      data:
        item_entity: input_select.item_usb_c_cable
        item_label: "USB-C cable"
        holder_entity: input_text.holder_usb_c_cable
        nfc_entity: input_text.last_nfc_usb_c_cable
        user_hint: "{{ user_hint | default('') }}"
        nfc_uid: "{{ nfc_uid | default('') }}"

