smartlend_reset_all:
  alias: "SmartLend - Reset all items to available"
  description: "Force all items back to 'available', clear user, holders, and action log"
  mode: single
  sequence:
    - service: input_select.select_option
      target:
        entity_id:
          - input_select.item_usb_c_cable
          - input_select.item_adapter
          - input_select.item_meter
          - input_select.item_tripod
          - input_select.item_microphone
          - input_select.item_ring_light
          - input_select.item_hdmi_cable
          - input_select.item_headphones
          - input_select.item_sd_reader
      data:
        option: available
    - service: input_text.set_value
      target:
        entity_id:
          - input_text.holder_usb_c_cable
          - input_text.holder_adapter
          - input_text.holder_meter
          - input_text.holder_tripod
          - input_text.holder_microphone
          - input_text.holder_ring_light
          - input_text.holder_hdmi_cable
          - input_text.holder_headphones
          - input_text.holder_sd_reader
          - input_text.last_nfc_usb_c_cable
          - input_text.last_nfc_adapter
          - input_text.last_nfc_meter
          - input_text.last_nfc_tripod
          - input_text.last_nfc_microphone
          - input_text.last_nfc_ring_light
          - input_text.last_nfc_hdmi_cable
          - input_text.last_nfc_headphones
          - input_text.last_nfc_sd_reader
      data:
        value: ""
    - service: input_text.set_value
      target:
        entity_id: input_text.last_action
      data:
        value: "All items reset"
    - service: input_text.set_value
      target:
        entity_id: input_text.active_user
      data:
        value: ""
    - service: logbook.log
      data:
        name: SmartLend
        message: "All items reset to available"

smartlend_toggle_quiet_mode:
  alias: "SmartLend - Toggle quiet mode"
  mode: single
  sequence:
    - service: input_boolean.toggle
      target:
        entity_id: input_boolean.quiet_mode
