persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# Local plaintext listener — for HA on loopback only
listener 1883 0.0.0.0
allow_anonymous false
password_file /mosquitto/config/passwd

# LAN TLS listener — for ESPHome / external clients
listener 8883 0.0.0.0
cafile /mosquitto/ssl/fullchain.pem
certfile /mosquitto/ssl/fullchain.pem
keyfile /mosquitto/ssl/privkey.pem
require_certificate false
