<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">SmartLend krok 1 - ESP32-C3 a NFC PN532</title>
  <desc id="desc">Samostatny diagram pro prvni zapojeni. ESP32-C3 SuperMini se propoji s cervenym NFC PN532 modulem pres 3V3, GND, SDA a SCL.</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .warn { fill: #fff1f2; stroke: #fb7185; stroke-width: 2; }
      .ok { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; }
      .note { fill: #eef3fb; stroke: #cbd5e1; stroke-width: 2; }
      .txt { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
      .title { font-size: 34px; font-weight: 800; }
      .h2 { font-size: 25px; font-weight: 800; }
      .h3 { font-size: 19px; font-weight: 800; }
      .body { font-size: 17px; }
      .small { font-size: 13px; }
      .pinText { font-size: 17px; font-weight: 800; }
      .label { font-size: 18px; font-weight: 800; }
      .pin { fill: #fff; stroke: #111827; stroke-width: 2; }
      .pad { fill: #d1d5db; stroke: #6b7280; stroke-width: 1.5; }
      .wireRed { stroke: #dc2626; stroke-width: 8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .wireBlack { stroke: #111827; stroke-width: 8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .wireBlue { stroke: #2563eb; stroke-width: 8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .wireYellow { stroke: #eab308; stroke-width: 8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .muted { fill: #4b5563; }
      .white { fill: #fff; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <text class="txt title" x="48" y="56">KROK 1 - zapoj jen ESP32-C3 + cervena NFC PN532</text>
  <text class="txt body muted" x="48" y="88">LED ring zatim vubec nezapojuj. Nejdriv musi ESPHome videt NFC ctecku a nacist UID karty/samolepky.</text>

  <rect class="warn" x="48" y="116" width="1504" height="72" rx="14"/>
  <text class="txt h3" x="72" y="145">Bezpecnost pred USB</text>
  <text class="txt body" x="72" y="171">NFC VCC jde na ESP 3.3V. Nikdy ne na 5V. Pin 5 na ESP neni 5V, je to GPIO5. Vsechny GND musi byt spolu.</text>

  <rect class="panel" x="48" y="218" width="1504" height="560" rx="18"/>

  <!-- Breadboard and ESP board -->
  <rect x="95" y="292" width="690" height="395" rx="18" fill="#f3f4f6" stroke="#9ca3af" stroke-width="3"/>
  <line x1="130" y1="330" x2="750" y2="330" stroke="#ef4444" stroke-width="4"/>
  <line x1="130" y1="650" x2="750" y2="650" stroke="#3b82f6" stroke-width="4"/>
  <rect x="402" y="292" width="58" height="395" fill="#e5e7eb"/>
  <text class="txt small muted" x="120" y="275">breadboard jako na fotce</text>
  <text class="txt small muted" x="409" y="275">stredova mezera</text>
  <g opacity=".35" fill="#111827">
    <circle cx="150" cy="378" r="5"/><circle cx="180" cy="378" r="5"/><circle cx="210" cy="378" r="5"/><circle cx="240" cy="378" r="5"/><circle cx="270" cy="378" r="5"/>
    <circle cx="510" cy="378" r="5"/><circle cx="540" cy="378" r="5"/><circle cx="570" cy="378" r="5"/><circle cx="600" cy="378" r="5"/><circle cx="630" cy="378" r="5"/>
    <circle cx="150" cy="430" r="5"/><circle cx="180" cy="430" r="5"/><circle cx="210" cy="430" r="5"/><circle cx="240" cy="430" r="5"/><circle cx="270" cy="430" r="5"/>
    <circle cx="510" cy="430" r="5"/><circle cx="540" cy="430" r="5"/><circle cx="570" cy="430" r="5"/><circle cx="600" cy="430" r="5"/><circle cx="630" cy="430" r="5"/>
    <circle cx="150" cy="482" r="5"/><circle cx="180" cy="482" r="5"/><circle cx="210" cy="482" r="5"/><circle cx="240" cy="482" r="5"/><circle cx="270" cy="482" r="5"/>
    <circle cx="510" cy="482" r="5"/><circle cx="540" cy="482" r="5"/><circle cx="570" cy="482" r="5"/><circle cx="600" cy="482" r="5"/><circle cx="630" cy="482" r="5"/>
    <circle cx="150" cy="534" r="5"/><circle cx="180" cy="534" r="5"/><circle cx="210" cy="534" r="5"/><circle cx="240" cy="534" r="5"/><circle cx="270" cy="534" r="5"/>
    <circle cx="510" cy="534" r="5"/><circle cx="540" cy="534" r="5"/><circle cx="570" cy="534" r="5"/><circle cx="600" cy="534" r="5"/><circle cx="630" cy="534" r="5"/>
  </g>

  <rect x="290" y="330" width="310" height="320" rx="18" fill="#111827" stroke="#030712" stroke-width="4"/>
  <rect x="396" y="302" width="100" height="48" rx="8" fill="#cfd5de" stroke="#6b7280" stroke-width="3"/>
  <rect x="382" y="370" width="50" height="28" rx="12" fill="#6b7280" stroke="#374151" stroke-width="2"/>
  <rect x="458" y="370" width="50" height="28" rx="12" fill="#6b7280" stroke="#374151" stroke-width="2"/>
  <polygon points="445,450 490,495 445,540 400,495" fill="#030712" stroke="#d1d5db" stroke-width="2"/>
  <rect x="402" y="628" width="88" height="13" rx="2" fill="#b91c1c"/>
  <text class="txt h2 white" x="342" y="432">ESP32-C3</text>
  <text class="txt body white" x="330" y="462">cerna deska v breadboardu</text>
  <text class="txt small" x="385" y="618" fill="#cbd5e1">cervena antena dole</text>

  <!-- ESP pads and labels -->
  <g>
    <rect class="pad" x="268" y="372" width="22" height="18" rx="4"/><text class="txt pinText" x="238" y="388">7</text>
    <rect class="pad" x="268" y="424" width="22" height="18" rx="4"/><text class="txt pinText" x="238" y="440">6</text>
    <rect class="pad" x="268" y="476" width="22" height="18" rx="4"/><text class="txt pinText" x="238" y="492">5</text>
    <rect class="pad" x="268" y="528" width="22" height="18" rx="4"/><text class="txt pinText" x="238" y="544">4</text>
    <rect class="pad" x="268" y="580" width="22" height="18" rx="4"/><text class="txt pinText" x="238" y="596">3</text>
    <rect class="pad" x="600" y="372" width="22" height="18" rx="4"/><text class="txt pinText" x="635" y="388">5V</text>
    <rect class="pad" x="600" y="424" width="22" height="18" rx="4"/><text class="txt pinText" x="635" y="440">G</text>
    <rect class="pad" x="600" y="476" width="22" height="18" rx="4"/><text class="txt pinText" x="635" y="492">3.3</text>
  </g>

  <!-- PN532 board -->
  <rect x="1010" y="295" width="465" height="395" rx="22" fill="#b91c1c" stroke="#7f1d1d" stroke-width="5"/>
  <rect x="1038" y="330" width="409" height="312" rx="16" fill="#dc2626" opacity=".38"/>
  <circle cx="1055" cy="615" r="22" fill="#fee2e2" stroke="#7f1d1d" stroke-width="3"/>
  <circle cx="1432" cy="330" r="22" fill="#fee2e2" stroke="#7f1d1d" stroke-width="3"/>
  <rect x="1213" y="432" width="82" height="66" rx="5" fill="#7f1d1d" opacity=".65"/>
  <text class="txt h2 white" x="1128" y="385">CERVENA VEC = NFC PN532</text>
  <text class="txt small white" x="1088" y="357">SCK</text><text class="txt small white" x="1138" y="357">MISO</text><text class="txt small white" x="1198" y="357">MOSI</text><text class="txt small white" x="1260" y="357">SS</text>
  <text class="txt small white" x="1312" y="357">VCC</text><text class="txt small white" x="1370" y="357">GND</text><text class="txt small white" x="1422" y="357">IRQ</text>
  <text class="txt body white" x="1095" y="548">Na tehle strane pouzij jen 4 piny:</text>
  <text class="txt body white" x="1095" y="578">GND / VCC / SDA / SCL</text>
  <text class="txt body white" x="1095" y="620">DIP/I2C podle tabulky: I2C = 1 0</text>

  <rect class="pin" x="910" y="400" width="82" height="36" rx="7"/><text class="txt pinText" x="934" y="424">GND</text>
  <rect class="pin" x="910" y="462" width="82" height="36" rx="7"/><text class="txt pinText" x="936" y="486">VCC</text>
  <rect class="pin" x="910" y="524" width="82" height="36" rx="7"/><text class="txt pinText" x="936" y="548">SDA</text>
  <rect class="pin" x="910" y="586" width="82" height="36" rx="7"/><text class="txt pinText" x="936" y="610">SCL</text>

  <!-- Wires -->
  <path class="wireBlack" d="M622 433 H780 V418 H910"/>
  <path class="wireRed" d="M622 485 H804 V480 H910"/>
  <path class="wireBlue" d="M268 485 H170 V230 H852 V542 H910"/>
  <path class="wireYellow" d="M268 433 H145 V205 H878 V604 H910"/>
  <circle cx="622" cy="433" r="8" fill="#111827"/><circle cx="910" cy="418" r="8" fill="#111827"/>
  <circle cx="622" cy="485" r="8" fill="#dc2626"/><circle cx="910" cy="480" r="8" fill="#dc2626"/>
  <circle cx="268" cy="485" r="8" fill="#2563eb"/><circle cx="910" cy="542" r="8" fill="#2563eb"/>
  <circle cx="268" cy="433" r="8" fill="#eab308"/><circle cx="910" cy="604" r="8" fill="#eab308"/>

  <rect x="665" y="332" width="284" height="238" rx="14" fill="#fff" opacity=".95" stroke="#e5e7eb" stroke-width="2"/>
  <text class="txt label" x="690" y="366" fill="#111827">1) ESP G -> NFC GND</text>
  <text class="txt label" x="690" y="416" fill="#dc2626">2) ESP 3.3 -> NFC VCC</text>
  <text class="txt label" x="690" y="466" fill="#2563eb">3) ESP pin 5 -> NFC SDA</text>
  <text class="txt label" x="690" y="516" fill="#b45309">4) ESP pin 6 -> NFC SCL</text>
  <text class="txt small muted" x="690" y="548">Pin 5 neni 5V. Je to GPIO5.</text>

  <rect class="ok" x="84" y="802" width="700" height="132" rx="14"/>
  <text class="txt h3" x="110" y="834">Kontrola pred zapnutim</text>
  <text class="txt body" x="110" y="866">1. NFC ma VCC na 3.3, ne na 5V.</text>
  <text class="txt body" x="110" y="895">2. SDA je na ESP pinu 5, SCL je na ESP pinu 6.</text>
  <text class="txt body" x="110" y="924">3. Teprve potom zapoj USB-C do notebooku.</text>

  <rect class="note" x="825" y="802" width="650" height="132" rx="14"/>
  <text class="txt h3" x="850" y="834">Co se nema zapojovat v kroku 1</text>
  <text class="txt body" x="850" y="866">LED ring nech odpojeny. Bila karta a samolepky se nezapojuji.</text>
  <text class="txt body" x="850" y="895">Jen je prilozis k cervene NFC ctecce az po nahrani ESPHome.</text>
  <text class="txt body" x="850" y="924">V logu ESPHome hledej nalezene UID tagu.</text>
</svg>
