<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">SmartLend realne zapojeni ESP32-C3, cervena NFC PN532 a LED ring</title>
  <desc id="desc">Diagram podle fotek hardwaru. Ukazuje bezpecne zapojeni cerveneho NFC modulu pres UART/HSU a LED ring jako druhy krok.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .card { fill: #fff; stroke: #ccd4e0; stroke-width: 2; }
      .safe { fill: #fff1f2; stroke: #fb7185; stroke-width: 2; }
      .ok { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; }
      .warn { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; }
      .note { fill: #eef3fb; stroke: #cbd5e1; stroke-width: 2; }
      .txt { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
      .title { font-size: 31px; font-weight: 800; }
      .h2 { font-size: 22px; font-weight: 800; }
      .h3 { font-size: 17px; font-weight: 800; }
      .body { font-size: 15px; }
      .small { font-size: 12px; }
      .pin { fill: #fff; stroke: #111827; stroke-width: 1.4; }
      .pinText { font-size: 12px; font-weight: 800; }
      .label { font-size: 13px; font-weight: 800; }
      .white { fill: #fff; }
      .muted { fill: #4b5563; }
      .redWire { stroke: #dc2626; stroke-width: 5.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .orangeWire { stroke: #f97316; stroke-width: 5.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .blackWire { stroke: #111827; stroke-width: 5.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .blueWire { stroke: #2563eb; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .yellowWire { stroke: #eab308; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .purpleWire { stroke: #7c3aed; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .badWire { stroke: #ef4444; stroke-width: 3.5; fill: none; stroke-dasharray: 10 8; stroke-linecap: round; }
      .hole { fill: #111827; opacity: .55; }
      .dimHole { fill: #111827; opacity: .25; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1050"/>

  <text class="txt title" x="42" y="48">SmartLend - jak to zapojit, aby se nic nespalilo</text>
  <text class="txt body muted" x="42" y="77">Nase rec: cerna deska v breadboardu = ESP32-C3, cervena vec = NFC PN532, kulata vec = LED ring, bila karta/samolepky se jen prikladaji.</text>

  <rect class="safe" x="42" y="103" width="1516" height="58" rx="12"/>
  <text class="txt h3" x="64" y="128">SAFE RULES</text>
  <text class="txt body" x="64" y="150">1) NFC VCC jde na ESP 3V3, ne na 5V.  2) Pin 5 neni 5V.  3) ESP GPIO nikdy nesmi dostat 5V.  4) Vsechny GND musi byt spolu.</text>

  <!-- STEP 1 PANEL -->
  <rect class="card" x="42" y="185" width="1516" height="510" rx="16"/>
  <text class="txt h2" x="70" y="222">KROK 1: ESP32-C3 + cervena NFC deska</text>
  <text class="txt body muted" x="70" y="249">Zapoj jen 4 kabely. Tvoje cervena deska pouziva UART: RXD / TXD / VCC / GND. LED ring zatim nech odpojeny.</text>

  <!-- Breadboard body -->
  <rect x="72" y="300" width="610" height="310" rx="14" fill="#f2f3f5" stroke="#9ca3af" stroke-width="2"/>
  <line x1="96" y1="324" x2="660" y2="324" stroke="#ef4444" stroke-width="3"/>
  <line x1="96" y1="586" x2="660" y2="586" stroke="#3b82f6" stroke-width="3"/>
  <rect x="345" y="300" width="48" height="310" fill="#e4e7ec"/>
  <text class="txt small muted" x="92" y="291">breadboard z fotek</text>
  <text class="txt small muted" x="368" y="291">mezera</text>
  <g>
    <circle class="dimHole" cx="115" cy="355" r="4"/><circle class="dimHole" cx="140" cy="355" r="4"/><circle class="dimHole" cx="165" cy="355" r="4"/><circle class="dimHole" cx="190" cy="355" r="4"/><circle class="dimHole" cx="215" cy="355" r="4"/>
    <circle class="dimHole" cx="425" cy="355" r="4"/><circle class="dimHole" cx="450" cy="355" r="4"/><circle class="dimHole" cx="475" cy="355" r="4"/><circle class="dimHole" cx="500" cy="355" r="4"/><circle class="dimHole" cx="525" cy="355" r="4"/>
    <circle class="dimHole" cx="115" cy="385" r="4"/><circle class="dimHole" cx="140" cy="385" r="4"/><circle class="dimHole" cx="165" cy="385" r="4"/><circle class="dimHole" cx="190" cy="385" r="4"/><circle class="dimHole" cx="215" cy="385" r="4"/>
    <circle class="dimHole" cx="425" cy="385" r="4"/><circle class="dimHole" cx="450" cy="385" r="4"/><circle class="dimHole" cx="475" cy="385" r="4"/><circle class="dimHole" cx="500" cy="385" r="4"/><circle class="dimHole" cx="525" cy="385" r="4"/>
    <circle class="dimHole" cx="115" cy="415" r="4"/><circle class="dimHole" cx="140" cy="415" r="4"/><circle class="dimHole" cx="165" cy="415" r="4"/><circle class="dimHole" cx="190" cy="415" r="4"/><circle class="dimHole" cx="215" cy="415" r="4"/>
    <circle class="dimHole" cx="425" cy="415" r="4"/><circle class="dimHole" cx="450" cy="415" r="4"/><circle class="dimHole" cx="475" cy="415" r="4"/><circle class="dimHole" cx="500" cy="415" r="4"/><circle class="dimHole" cx="525" cy="415" r="4"/>
    <circle class="dimHole" cx="115" cy="445" r="4"/><circle class="dimHole" cx="140" cy="445" r="4"/><circle class="dimHole" cx="165" cy="445" r="4"/><circle class="dimHole" cx="190" cy="445" r="4"/><circle class="dimHole" cx="215" cy="445" r="4"/>
    <circle class="dimHole" cx="425" cy="445" r="4"/><circle class="dimHole" cx="450" cy="445" r="4"/><circle class="dimHole" cx="475" cy="445" r="4"/><circle class="dimHole" cx="500" cy="445" r="4"/><circle class="dimHole" cx="525" cy="445" r="4"/>
    <circle class="dimHole" cx="115" cy="475" r="4"/><circle class="dimHole" cx="140" cy="475" r="4"/><circle class="dimHole" cx="165" cy="475" r="4"/><circle class="dimHole" cx="190" cy="475" r="4"/><circle class="dimHole" cx="215" cy="475" r="4"/>
    <circle class="dimHole" cx="425" cy="475" r="4"/><circle class="dimHole" cx="450" cy="475" r="4"/><circle class="dimHole" cx="475" cy="475" r="4"/><circle class="dimHole" cx="500" cy="475" r="4"/><circle class="dimHole" cx="525" cy="475" r="4"/>
  </g>

  <!-- ESP32 board on breadboard - like your photo: USB-C top, two buttons, red antenna bottom -->
  <rect x="238" y="332" width="270" height="255" rx="14" fill="#111827" stroke="#030712" stroke-width="3"/>
  <rect x="330" y="315" width="88" height="38" rx="7" fill="#cfd5de" stroke="#6b7280" stroke-width="2"/>
  <rect x="322" y="367" width="43" height="24" rx="10" fill="#6b7280" stroke="#374151" stroke-width="2"/>
  <rect x="382" y="367" width="43" height="24" rx="10" fill="#6b7280" stroke="#374151" stroke-width="2"/>
  <text class="txt small" x="255" y="360" fill="#9ca3af">BOOT</text>
  <text class="txt small" x="438" y="360" fill="#9ca3af">RST</text>
  <rect x="338" y="568" width="76" height="12" rx="2" fill="#b91c1c"/>
  <polygon points="373,435 410,472 373,509 336,472" fill="#030712" stroke="#d1d5db" stroke-width="1.5"/>
  <text class="txt h3 white" x="318" y="420">ESP32-C3</text>
  <text class="txt body white" x="305" y="445">ta cerna deska</text>
  <text class="txt small" x="337" y="548" fill="#9ca3af">cervena antena dole</text>

  <!-- ESP side pads and labels. Right side mirrors the visible labels in your new photo. -->
  <g>
    <rect x="222" y="356" width="16" height="13" rx="3" fill="#d1d5db"/><text class="txt small" x="192" y="367" fill="#111827">10</text>
    <rect x="222" y="384" width="16" height="13" rx="3" fill="#d1d5db"/><text class="txt small" x="198" y="395" fill="#111827">9</text>
    <rect x="222" y="412" width="16" height="13" rx="3" fill="#d1d5db"/><text class="txt small" x="198" y="423" fill="#111827">8</text>
    <rect x="222" y="440" width="16" height="13" rx="3" fill="#d1d5db"/><text class="txt small" x="198" y="451" fill="#111827">4</text>
    <rect x="222" y="468" width="16" height="13" rx="3" fill="#d1d5db"/><text class="txt small" x="198" y="479" fill="#111827">3</text>
    <rect x="222" y="496" width="16" height="13" rx="3" fill="#d1d5db"/><text class="txt small" x="198" y="507" fill="#111827">2</text>
    <rect x="222" y="524" width="16" height="13" rx="3" fill="#d1d5db"/><text class="txt small" x="198" y="535" fill="#111827">1</text>
    <rect x="222" y="552" width="16" height="13" rx="3" fill="#d1d5db"/><text class="txt small" x="190" y="563" fill="#111827">21</text>
    <rect x="508" y="356" width="16" height="13" rx="3" fill="#d1d5db"/><text class="txt small" x="530" y="367" fill="#111827">5V</text>
    <rect x="508" y="384" width="16" height="13" rx="3" fill="#d1d5db"/><text class="txt small" x="530" y="395" fill="#111827">G</text>
    <rect x="508" y="412" width="16" height="13" rx="3" fill="#d1d5db"/><text class="txt small" x="530" y="423" fill="#111827">3.3</text>
    <rect x="508" y="440" width="16" height="13" rx="3" fill="#d1d5db"/><text class="txt small" x="530" y="451" fill="#111827">5</text>
    <rect x="508" y="468" width="16" height="13" rx="3" fill="#d1d5db"/><text class="txt small" x="530" y="479" fill="#111827">6</text>
    <rect x="508" y="496" width="16" height="13" rx="3" fill="#d1d5db"/><text class="txt small" x="530" y="507" fill="#111827">7</text>
    <rect x="508" y="524" width="16" height="13" rx="3" fill="#d1d5db"/><text class="txt small" x="530" y="535" fill="#111827">20</text>
    <rect x="508" y="552" width="16" height="13" rx="3" fill="#d1d5db"/><text class="txt small" x="530" y="563" fill="#111827">0</text>
  </g>
  <text class="txt small muted" x="246" y="610">orientace jako na fotce: USB-C nahore, cervena antena dole</text>
  <rect class="note" x="84" y="628" width="586" height="45" rx="10"/>
  <text class="txt body" x="102" y="657">Na ESP hledej potisk: 3.3, G, 5 a 6. Signaly dej opravdu do pinu 5 a 6, ne do 5V/G.</text>

  <!-- PN532 board close to real -->
  <rect x="1040" y="318" width="420" height="260" rx="18" fill="#b91c1c" stroke="#7f1d1d" stroke-width="4"/>
  <rect x="1062" y="340" width="376" height="216" rx="12" fill="#dc2626" opacity=".35"/>
  <circle cx="1080" cy="535" r="18" fill="#fee2e2" stroke="#7f1d1d" stroke-width="3"/>
  <circle cx="1420" cy="352" r="18" fill="#fee2e2" stroke="#7f1d1d" stroke-width="3"/>
  <rect x="1214" y="407" width="72" height="58" rx="4" fill="#7f1d1d" opacity=".65"/>
  <text class="txt h3 white" x="1160" y="385">CERVENA VEC = NFC UART</text>
  <text class="txt small white" x="1198" y="533">DIP/mode nastav na HSU/UART = 0 0. Ne I2C = 1 0.</text>
  <text class="txt small white" x="1088" y="367">SCK</text><text class="txt small white" x="1132" y="367">MISO</text><text class="txt small white" x="1184" y="367">MOSI</text><text class="txt small white" x="1238" y="367">SS</text>
  <text class="txt small white" x="1284" y="367">VCC</text><text class="txt small white" x="1331" y="367">GND</text><text class="txt small white" x="1380" y="367">IRQ</text>

  <!-- NFC UART header labels from the real red board -->
  <rect class="pin" x="948" y="386" width="74" height="28" rx="6"/><text class="txt pinText" x="968" y="405">GND</text>
  <rect class="pin" x="948" y="426" width="74" height="28" rx="6"/><text class="txt pinText" x="970" y="445">VCC</text>
  <rect class="pin" x="948" y="466" width="74" height="28" rx="6"/><text class="txt pinText" x="969" y="485">TXD</text>
  <rect class="pin" x="948" y="506" width="74" height="28" rx="6"/><text class="txt pinText" x="969" y="525">RXD</text>
  <text class="txt small white" x="1086" y="484">Pouzij jen tyhle 4 piny:</text>
  <text class="txt small white" x="1086" y="506">GND / VCC / TXD / RXD</text>

  <!-- Wires ESP to NFC -->
  <path class="blackWire" d="M524 390 H810 V400 H948"/>
  <path class="redWire" d="M524 418 H790 V440 H948"/>
  <path class="blueWire" d="M524 446 H835 V480 H948"/>
  <path class="yellowWire" d="M524 474 H855 V520 H948"/>
  <circle cx="524" cy="390" r="5" fill="#111827"/><circle cx="948" cy="400" r="5" fill="#111827"/>
  <circle cx="524" cy="418" r="5" fill="#dc2626"/><circle cx="948" cy="440" r="5" fill="#dc2626"/>
  <circle cx="524" cy="446" r="5" fill="#2563eb"/><circle cx="948" cy="480" r="5" fill="#2563eb"/>
  <circle cx="524" cy="474" r="5" fill="#eab308"/><circle cx="948" cy="520" r="5" fill="#eab308"/>
  <rect x="590" y="336" width="270" height="170" rx="10" fill="#fff" opacity=".92" stroke="#e5e7eb" stroke-width="1"/>
  <text class="txt label" x="610" y="356" fill="#dc2626">ESP 3.3 -> NFC VCC</text>
  <text class="txt label" x="610" y="397">ESP G -> NFC GND</text>
  <text class="txt label" x="610" y="454" fill="#2563eb">NFC TXD -> ESP pin 5 / GPIO5</text>
  <text class="txt label" x="610" y="492" fill="#b45309">NFC RXD -> ESP pin 6 / GPIO6</text>

  <rect class="warn" x="710" y="625" width="388" height="48" rx="10"/>
  <text class="txt body" x="730" y="655">Pozor: NFC VCC jde na 3V3. 5V sem nepatri.</text>
  <rect class="ok" x="1124" y="625" width="382" height="48" rx="10"/>
  <text class="txt body" x="1144" y="655">Test OK: v logu uvidis UID tagu/karty.</text>

  <!-- STEP 2 PANEL -->
  <rect class="card" x="42" y="720" width="1516" height="255" rx="16"/>
  <text class="txt h2" x="70" y="758">KROK 2: az NFC funguje, pridej kulaty LED ring</text>
  <text class="txt body muted" x="70" y="783">Pouzij vstupni stranu ringu z fotky: GND / VCC / IN. Druha strana OUT / VCC / GND se ted nezapojuje.</text>

  <!-- Small ESP pins for ring -->
  <rect class="note" x="82" y="815" width="420" height="112" rx="12"/>
  <text class="txt h3" x="105" y="843">Z ESP vezmi tyhle 3 piny</text>
  <rect class="pin" x="114" y="862" width="84" height="28" rx="6"/><text class="txt pinText" x="137" y="881">GND</text>
  <rect class="pin" x="236" y="862" width="84" height="28" rx="6"/><text class="txt pinText" x="265" y="881">5V</text>
  <rect class="pin" x="356" y="862" width="84" height="28" rx="6"/><text class="txt pinText" x="381" y="881">GPIO3</text>
  <text class="txt small muted" x="105" y="913">GPIO3 je bezpecnejsi nez GPIO2. GPIO2 muze ovlivnit boot ESP32-C3.</text>

  <!-- LED ring real shape -->
  <circle cx="1045" cy="848" r="91" fill="#111827" stroke="#030712" stroke-width="5"/>
  <circle cx="1045" cy="848" r="54" fill="#fff" stroke="#9ca3af" stroke-width="2"/>
  <g fill="#fbbf24">
    <circle cx="1045" cy="758" r="7"/><circle cx="1090" cy="771" r="7"/><circle cx="1124" cy="805" r="7"/><circle cx="1136" cy="850" r="7"/>
    <circle cx="1122" cy="895" r="7"/><circle cx="1089" cy="926" r="7"/><circle cx="1045" cy="938" r="7"/><circle cx="1001" cy="926" r="7"/>
    <circle cx="968" cy="895" r="7"/><circle cx="955" cy="850" r="7"/><circle cx="966" cy="805" r="7"/><circle cx="1000" cy="771" r="7"/>
  </g>
  <text class="txt h3" x="1010" y="843">LED</text>
  <text class="txt h3" x="1000" y="866">RING</text>

  <!-- LED ring two headers -->
  <rect x="930" y="743" width="102" height="34" rx="6" fill="#111827"/>
  <rect class="pin" x="927" y="715" width="34" height="24" rx="5"/><text class="txt small" x="934" y="732">GND</text>
  <rect class="pin" x="966" y="715" width="34" height="24" rx="5"/><text class="txt small" x="975" y="732">VCC</text>
  <rect class="pin" x="1005" y="715" width="34" height="24" rx="5"/><text class="txt small" x="1015" y="732">IN</text>
  <text class="txt small" x="918" y="706">POUZIJ TADY</text>

  <rect x="1118" y="743" width="102" height="34" rx="6" fill="#111827"/>
  <rect class="pin" x="1115" y="715" width="34" height="24" rx="5"/><text class="txt small" x="1123" y="732">OUT</text>
  <rect class="pin" x="1154" y="715" width="34" height="24" rx="5"/><text class="txt small" x="1163" y="732">VCC</text>
  <rect class="pin" x="1193" y="715" width="34" height="24" rx="5"/><text class="txt small" x="1200" y="732">GND</text>
  <text class="txt small muted" x="1117" y="706">NECH PRAZDNE</text>

  <!-- Ring wires -->
  <path class="blackWire" d="M198 876 H700 V727 H927"/>
  <path class="orangeWire" d="M320 876 H720 V727 H966"/>
  <path class="purpleWire" d="M440 876 H580 V940 H760 V727 H1005"/>
  <circle cx="198" cy="876" r="5" fill="#111827"/><circle cx="927" cy="727" r="5" fill="#111827"/>
  <circle cx="320" cy="876" r="5" fill="#f97316"/><circle cx="966" cy="727" r="5" fill="#f97316"/>
  <circle cx="440" cy="876" r="5" fill="#7c3aed"/><circle cx="1005" cy="727" r="5" fill="#7c3aed"/>
  <rect x="602" y="921" width="96" height="34" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text class="txt body" x="620" y="943" fill="#5b21b6">330 ohm</text>
  <rect x="508" y="795" width="260" height="103" rx="10" fill="#fff" opacity=".92" stroke="#e5e7eb" stroke-width="1"/>
  <text class="txt label" x="522" y="815">ESP GND -> ring GND</text>
  <text class="txt label" x="522" y="848" fill="#f97316">ESP 5V -> ring VCC</text>
  <text class="txt label" x="522" y="881" fill="#7c3aed">ESP GPIO3 -> 330R -> ring IN</text>

  <rect class="warn" x="1238" y="725" width="275" height="52" rx="10"/>
  <text class="txt small" x="1254" y="748">Ring: max 20-40 % jas.</text>
  <text class="txt small" x="1254" y="766">Plny bily jas muze brat moc proudu.</text>

  <!-- Tags/cards -->
  <rect x="1320" y="794" width="94" height="128" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text class="txt body" x="1336" y="846">bila</text>
  <text class="txt body" x="1328" y="870">karticka</text>
  <circle cx="1455" cy="820" r="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
  <circle cx="1496" cy="860" r="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
  <circle cx="1450" cy="903" r="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
  <text class="txt body" x="1295" y="950">karticka a samolepky se nezapojuji</text>
  <text class="txt body" x="1295" y="970">jen je prilozis k cervene NFC</text>

  <!-- Footer source note -->
  <text class="txt small muted" x="42" y="1024">Aktualni fix: cervena NFC deska jede pres UART/HSU, ne pres I2C. Detailni text je v implementationdetails.md.</text>
</svg>
